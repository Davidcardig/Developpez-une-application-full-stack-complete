<div class="login-container">
  <mat-card class="login-card">
    <mat-card-header>
      <div class="header-content">
        <button mat-icon-button class="back-btn" (click)="goToHome()" aria-label="Retour à l'accueil">
          <mat-icon>arrow_back</mat-icon>
        </button>
        <div>
          <mat-card-title>Connexion</mat-card-title>
          <mat-card-subtitle>Connectez-vous à votre compte MDD</mat-card-subtitle>
        </div>
      </div>
    </mat-card-header>

    <mat-card-content>
      <form [formGroup]="loginForm" (ngSubmit)="onSubmit()">
        <mat-form-field appearance="outline" class="full-width">
          <mat-label>Email ou nom d'utilisateur</mat-label>
          <input
            matInput
            type="text"
            formControlName="emailOrUsername"
            placeholder="Entrez votre email ou nom d'utilisateur"
            autocomplete="username"
          />
          <mat-error *ngIf="loginForm.get('emailOrUsername')?.hasError('required')">
            Ce champ est obligatoire
          </mat-error>
        </mat-form-field>

        <mat-form-field appearance="outline" class="full-width">
          <mat-label>Mot de passe</mat-label>
          <input
            matInput
            [type]="hide ? 'password' : 'text'"
            formControlName="password"
            placeholder="Entrez votre mot de passe"
            autocomplete="current-password"
          />
          <button
            mat-icon-button
            matSuffix
            (click)="hide = !hide"
            type="button"
            [attr.aria-label]="'Hide password'"
            [attr.aria-pressed]="hide"
          >
            <mat-icon>{{ hide ? 'visibility_off' : 'visibility' }}</mat-icon>
          </button>
          <mat-error *ngIf="loginForm.get('password')?.hasError('required')">
            Le mot de passe est obligatoire
          </mat-error>
          <mat-error *ngIf="loginForm.get('password')?.hasError('minlength')">
            Le mot de passe doit contenir au moins 6 caractères
          </mat-error>
        </mat-form-field>

        <div class="error-message" *ngIf="errorMessage">
          <mat-error>{{ errorMessage }}</mat-error>
        </div>

        <div class="actions">
          <button
            mat-raised-button
            color="primary"
            type="submit"
            [disabled]="loginForm.invalid || loading"
            class="full-width"
          >
            <span *ngIf="!loading">Se connecter</span>
            <mat-spinner *ngIf="loading" diameter="20"></mat-spinner>
          </button>
        </div>
      </form>
    </mat-card-content>


  </mat-card>
</div>
